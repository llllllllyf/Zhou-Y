<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhou Yi Divination - I Ching Hexagram Tool</title>
    <style>
        :root {
            --bg: #fdf6ee;
            --card: #fffef9;
            --text: #3d3226;
            --text-light: #6b5e4f;
            --gold: #b8860b;
            --gold-light: #d4a745;
            --red: #8b1a1a;
            --red-light: #c44d4d;
            --border: #e0d5c1;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
            --yin: #4a4a4a;
            --yang: #f0e6d3;
            --accent: #5c3d2e;
            --jade: #6b8e6b;
            --jade-light: #e8f0e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', '楷体', '宋体', 'Times New Roman', serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(184, 134, 11, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(139, 26, 26, 0.03) 0%, transparent 60%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 16px 18px 40px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 28px 0 10px;
            position: relative;
        }
        .header .bagua-symbol {
            font-size: 52px;
            letter-spacing: 6px;
            opacity: 0.7;
            margin-bottom: 4px;
            display: block;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-top: 2px;
        }
        .header::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 12px auto 0;
            border-radius: 1px;
            opacity: 0.6;
        }

        /* Method tabs */
        .method-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 16px;
        }
        .method-tab {
            padding: 10px 20px;
            border: 1.5px solid var(--border);
            background: var(--card);
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.25s;
            color: var(--text-light);
            font-family: inherit;
            white-space: nowrap;
        }
        .method-tab:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 2px 8px rgba(184, 134, 11, 0.12);
        }
        .method-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 600;
        }

        /* Main card */
        .main-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 22px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            transition: all 0.3s;
        }
        .main-card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
        }

        /* Coin area */
        .shake-area {
            text-align: center;
            padding: 10px 0;
        }
        .shake-info {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .coins-display {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 14px 0;
            min-height: 70px;
            align-items: center;
            flex-wrap: wrap;
        }
        .coin {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            cursor: default;
            user-select: none;
            background: linear-gradient(135deg, #e8d5a3 0%, #c9a84c 40%, #b8902a 60%, #d4b868 100%);
            color: #5c3d0e;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .coin.spinning {
            animation: coinFlip 0.6s ease-in-out;
        }
        .coin.heads {
            background: linear-gradient(135deg, #f5e6c8 0%, #e0c878 35%, #c9a040 55%, #e8d090 100%);
        }
        .coin.tails {
            background: linear-gradient(135deg, #c8b878 0%, #a08040 40%, #8b6a28 60%, #b89850 100%);
            color: #3d2a0a;
        }
        @keyframes coinFlip {
            0% { transform: rotateY(0) scale(1); }
            30% { transform: rotateY(180deg) scale(1.15); }
            60% { transform: rotateY(360deg) scale(0.9); }
            80% { transform: rotateY(540deg) scale(1.05); }
            100% { transform: rotateY(720deg) scale(1); }
        }

        .btn-shake {
            display: inline-block;
            padding: 12px 40px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(92, 61, 46, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-shake:hover {
            background: #4a2d1a;
            box-shadow: 0 6px 20px rgba(92, 61, 46, 0.4);
            transform: translateY(-1px);
        }
        .btn-shake:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(92, 61, 46, 0.3);
        }
        .btn-shake:disabled {
            background: #b0a090;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .btn-reset {
            display: inline-block;
            padding: 8px 22px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            background: transparent;
            color: var(--text-light);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            margin-left: 10px;
        }
        .btn-reset:hover {
            border-color: var(--red-light);
            color: var(--red);
        }

        /* Yao lines */
        .yao-lines {
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .yao-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: default;
        }
        .yao-label {
            width: 42px;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .yao-symbol {
            font-size: 1.6rem;
            letter-spacing: 2px;
            min-width: 80px;
            text-align: center;
            transition: all 0.3s;
        }
        .yao-symbol.changing {
            color: var(--red);
            font-weight: bold;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .yao-desc {
            font-size: 0.78rem;
            color: var(--text-light);
            min-width: 60px;
            flex-shrink: 0;
        }
        .yao-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 3px;
            vertical-align: middle;
        }
        .yao-dot.changing-dot {
            background: var(--red);
            box-shadow: 0 0 6px rgba(200, 40, 40, 0.6);
        }
        .yao-dot.stable-dot {
            background: #888;
        }

        /* Result section */
        .result-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed var(--border);
        }
        .gua-card {
            background: linear-gradient(180deg, #fffef9 0%, #fdf8ef 100%);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
            box-shadow: 0 0 0 1px rgba(184, 134, 11, 0.15);
            margin-bottom: 14px;
        }
        .gua-card .card-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .gua-card .gua-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
            margin: 4px 0;
        }
        .gua-card .gua-pinyin {
            font-size: 0.9rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }
        .gua-card .gua-symbol {
            font-size: 2.8rem;
            letter-spacing: 6px;
            margin: 8px 0;
            line-height: 1.2;
        }
        .gua-card .gua-trigrams {
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        .interpretation {
            margin-top: 16px;
            padding: 16px;
            background: #fdfaf4;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            line-height: 1.8;
        }
        .interpretation h3 {
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 8px;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
        }
        .interpretation .highlight {
            color: var(--red);
            font-weight: 600;
        }
        .interpretation .tag {
            display: inline-block;
            padding: 3px 10px;
            background: var(--jade-light);
            color: var(--jade);
            border-radius: 12px;
            font-size: 0.78rem;
            margin: 3px 4px;
            letter-spacing: 1px;
        }
        .interpretation .tag.warning {
            background: #fdf0f0;
            color: #a04040;
        }
        .interpretation .tag.good {
            background: #f0f8f0;
            color: #407040;
        }

        .time-gua-display {
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }
        .time-gua-display .big-num {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px 10px 30px;
            }
            .header h1 {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }
            .header .bagua-symbol {
                font-size: 38px;
            }
            .main-card {
                padding: 16px 12px;
                border-radius: 12px;
            }
            .coin {
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }
            .coins-display {
                gap: 10px;
            }
            .gua-card .gua-symbol {
                font-size: 2rem;
            }
            .gua-card .gua-name {
                font-size: 1.3rem;
            }
            .btn-shake {
                padding: 10px 28px;
                font-size: 1rem;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .toast.show {
            opacity: 1;
        }

        @media print {
            body {
                background: #fff;
                color: #000;
            }
            .btn-shake,
            .btn-reset,
            .method-tabs,
            .toast {
                display: none !important;
            }
            .main-card {
                box-shadow: none;
                border: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="bagua-symbol">☰ ☷ ☲ ☵ ☳ ☴ ☶ ☱</span>
            <h1>Zhou Yi Divination</h1>
            <p class="subtitle">I Ching Hexagram Tool</p>
        </div>

        <div class="method-tabs">
            <button class="method-tab active" data-method="coin" title="Simulate tossing three coins six times">🪙 Coin Toss</button>
            <button class="method-tab" data-method="time" title="Automatic hexagram based on current time">🕐 Time-based</button>
            <button class="method-tab" data-method="quick" title="Instant random hexagram">🎲 Quick Cast</button>
        </div>

        <div class="main-card" id="mainCard">
            <!-- Coin shaking area -->
            <div class="shake-area" id="shakeArea">
                <p class="shake-info" id="shakeInfo">Click the button below to toss coins <strong>six times</strong> (from the first line to the top line)</p>
                <div class="coins-display" id="coinsDisplay">
                    <div class="coin heads">☯</div>
                    <div class="coin heads">☯</div>
                    <div class="coin heads">☯</div>
                </div>
                <div style="margin-top:8px;">
                    <button class="btn-shake" id="btnShake" onclick="shakeCoins()">🪙 Shake</button>
                    <button class="btn-reset" id="btnReset" onclick="resetAll()">Start Over</button>
                </div>
                <div class="yao-lines" id="yaoLines"></div>
            </div>

            <!-- Time-based area -->
            <div class="time-gua-display" id="timeGuaArea" style="display:none;">
                <p style="letter-spacing:1px;color:var(--text-light);">Current Time Divination</p>
                <p class="big-num" id="timeDisplay"></p>
                <p style="font-size:0.8rem;color:var(--text-light);">Year+Month+Day → Upper Trigram | +Hour → Lower Trigram | Minute → Moving Yao</p>
                <button class="btn-shake" onclick="generateTimeGua()" style="margin-top:10px;">🕐 Cast by Time</button>
                <div class="yao-lines" id="yaoLinesTime"></div>
            </div>

            <!-- Quick cast area -->
            <div class="shake-area" id="quickGuaArea" style="display:none;">
                <p style="letter-spacing:1px;color:var(--text-light);margin-bottom:12px;">Generate a full hexagram instantly</p>
                <button class="btn-shake" onclick="generateQuickGua()">🎲 Quick Cast</button>
                <div class="yao-lines" id="yaoLinesQuick"></div>
            </div>

            <!-- Result display -->
            <div class="result-section" id="resultSection" style="display:none;"></div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        // ==================== Trigrams Base ====================
        const BA_GUA = {
            '111': { name: '乾', symbol: '☰', wuxing: 'Metal', nature: 'Heaven', direction: 'NW' },
            '110': { name: '兑', symbol: '☱', wuxing: 'Metal', nature: 'Lake', direction: 'W' },
            '101': { name: '离', symbol: '☲', wuxing: 'Fire', nature: 'Fire', direction: 'S' },
            '100': { name: '震', symbol: '☳', wuxing: 'Wood', nature: 'Thunder', direction: 'E' },
            '011': { name: '巽', symbol: '☴', wuxing: 'Wood', nature: 'Wind', direction: 'SE' },
            '010': { name: '坎', symbol: '☵', wuxing: 'Water', nature: 'Water', direction: 'N' },
            '001': { name: '艮', symbol: '☶', wuxing: 'Earth', nature: 'Mountain', direction: 'NE' },
            '000': { name: '坤', symbol: '☷', wuxing: 'Earth', nature: 'Earth', direction: 'SW' }
        };

        // 64 Hexagrams Data: [index, name, pinyin, upper key, lower key, gua ci, tuan zhuan, da xiang, [6 yao ci], yong (optional)]
        const GUA_DATA = [
            [1, '乾为天', 'qián', '111', '111',
                '元亨利贞。',
                '大哉乾元，万物资始，乃统天。云行雨施，品物流形。大明终始，六位时成，时乘六龙以御天。乾道变化，各正性命，保合太和，乃利贞。首出庶物，万国咸宁。',
                '天行健，君子以自强不息。',
                ['潜龙勿用。', '见龙在田，利见大人。', '君子终日乾乾，夕惕若厉，无咎。', '或跃在渊，无咎。', '飞龙在天，利见大人。',
                    '亢龙有悔。'
                ], '见群龙无首，吉。'
            ],
            [2, '坤为地', 'kūn', '000', '000',
                '元亨，利牝马之贞。君子有攸往，先迷后得主，利。西南得朋，东北丧朋。安贞吉。',
                '至哉坤元，万物资生，乃顺承天。坤厚载物，德合无疆。含弘光大，品物咸亨。牝马地类，行地无疆，柔顺利贞。君子攸行，先迷失道，后顺得常。西南得朋，乃与类行；东北丧朋，乃终有庆。安贞之吉，应地无疆。',
                '地势坤，君子以厚德载物。',
                ['履霜，坚冰至。', '直方大，不习无不利。', '含章可贞，或从王事，无成有终。', '括囊，无咎无誉。', '黄裳，元吉。',
                    '龙战于野，其血玄黄。'
                ], '利永贞。'
            ],
            [3, '水雷屯', 'zhūn', '010', '100',
                '元亨利贞。勿用有攸往。利建侯。',
                '屯，刚柔始交而难生。动乎险中，大亨贞。雷雨之动满盈，天造草昧，宜建侯而不宁。',
                '云雷屯，君子以经纶。',
                ['磐桓，利居贞，利建侯。', '屯如邅如，乘马班如。匪寇婚媾，女子贞不字，十年乃字。', '即鹿无虞，惟入于林中，君子几不如舍，往吝。',
                    '乘马班如，求婚媾，往吉，无不利。', '屯其膏，小贞吉，大贞凶。', '乘马班如，泣血涟如。'
                ]
            ],
            [4, '山水蒙', 'méng', '001', '010',
                '亨。匪我求童蒙，童蒙求我。初筮告，再三渎，渎则不告。利贞。',
                '蒙，山下有险，险而止，蒙。蒙亨，以亨行时中也。匪我求童蒙，童蒙求我，志应也。初筮告，以刚中也。再三渎，渎则不告，渎蒙也。蒙以养正，圣功也。',
                '山下出泉，蒙。君子以果行育德。',
                ['发蒙，利用刑人，用说桎梏，以往吝。', '包蒙吉，纳妇吉，子克家。', '勿用取女，见金夫，不有躬，无攸利。', '困蒙，吝。', '童蒙，吉。',
                    '击蒙，不利为寇，利御寇。'
                ]
            ],
            [5, '水天需', 'xū', '010', '111',
                '有孚，光亨，贞吉。利涉大川。',
                '需，须也，险在前也。刚健而不陷，其义不困穷矣。需有孚，光亨贞吉，位乎天位，以正中也。利涉大川，往有功也。',
                '云上于天，需。君子以饮食宴乐。',
                ['需于郊，利用恒，无咎。', '需于沙，小有言，终吉。', '需于泥，致寇至。', '需于血，出自穴。', '需于酒食，贞吉。', '入于穴，有不速之客三人来，敬之终吉。']
            ],
            [6, '天水讼', 'sòng', '111', '010',
                '有孚窒惕，中吉，终凶。利见大人，不利涉大川。',
                '讼，上刚下险，险而健，讼。讼有孚窒惕中吉，刚来而得中也。终凶，讼不可成也。利见大人，尚中正也。不利涉大川，入于渊也。',
                '天与水违行，讼。君子以作事谋始。',
                ['不永所事，小有言，终吉。', '不克讼，归而逋，其邑人三百户，无眚。', '食旧德，贞厉，终吉。或从王事，无成。', '不克讼，复即命，渝安贞，吉。',
                    '讼，元吉。', '或锡之鞶带，终朝三褫之。'
                ]
            ],
            [7, '地水师', 'shī', '000', '010',
                '贞，丈人吉，无咎。',
                '师，众也。贞，正也。能以众正，可以王矣。刚中而应，行险而顺，以此毒天下，而民从之，吉又何咎矣。',
                '地中有水，师。君子以容民畜众。',
                ['师出以律，否臧凶。', '在师中，吉无咎，王三锡命。', '师或舆尸，凶。', '师左次，无咎。', '田有禽，利执言，无咎。长子帅师，弟子舆尸，贞凶。',
                    '大君有命，开国承家，小人勿用。'
                ]
            ],
            [8, '水地比', 'bǐ', '010', '000',
                '吉。原筮，元永贞，无咎。不宁方来，后夫凶。',

        });

        function getGuaByTrigrams(shangKey, xiaKey) {
            const key = shangKey + '|' + xiaKey;
            return guaMap[key] || null;
        }

        function getBaguaByKey(key) {
            return BA_GUA[key] || null;
        }

        // ==================== Global State ====================
        let currentMethod = 'coin';
        let shakeCount = 0;
        let yaoResults = []; // [{value, isYang, isChanging}]
        let currentBenGua = null;
        let changingYaoIndexes = [];

        // ==================== Utility Functions ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 1800);
        }

        function yaoValueToDisplay(v) {
            if (v === 6) return { symbol: '⚋×', desc: 'Old Yin (6)→Yang', cls: 'changing', isYang: false, isChanging: true };
            if (v === 7) return { symbol: '⚊', desc: 'Young Yang (7)', cls: '', isYang: true, isChanging: false };
            if (v === 8) return { symbol: '⚋', desc: 'Young Yin (8)', cls: '', isYang: false, isChanging: false };
            if (v === 9) return { symbol: '⚊○', desc: 'Old Yang (9)→Yin', cls: 'changing', isYang: true, isChanging: true };
            return { symbol: '?', desc: 'Unknown', cls: '', isYang: false, isChanging: false };
        }

        function tossThreeCoins() {
            const r = Math.random();
            if (r < 0.125) return { value: 6, faces: ['tails','tails','tails'] };
            if (r < 0.5)   return { value: 8, faces: ['tails','tails','heads'] };
            if (r < 0.875) return { value: 7, faces: ['heads','heads','tails'] };
            return { value: 9, faces: ['heads','heads','heads'] };
        }

        // ==================== Coin Shaking ====================
        function shakeCoins() {
            if (shakeCount >= 6) {
                showToast('You have already cast six times. View result or start over.');
                return;
            }
            const btn = document.getElementById('btnShake');
            btn.disabled = true;

            const coins = document.querySelectorAll('#coinsDisplay .coin');
            coins.forEach(c => c.classList.add('spinning'));

            const result = tossThreeCoins();
            const faces = result.faces;

            setTimeout(() => {
                coins.forEach((c, i) => {
                    c.classList.remove('spinning');
                    c.textContent = faces[i] === 'heads' ? 'H' : 'T';
                    c.className = 'coin ' + (faces[i] === 'heads' ? 'heads' : 'tails');
                });
            }, 400);

            setTimeout(() => {
                shakeCount++;
                const display = yaoValueToDisplay(result.value);
                yaoResults.push({
                    value: result.value,
                    isYang: display.isYang,
                    isChanging: display.isChanging
                });

                updateYaoLinesDisplay('yaoLines');
                const yaoNames = ['First','Second','Third','Fourth','Fifth','Top'];
                document.getElementById('shakeInfo').innerHTML =
                    `Cast <strong>${shakeCount}/6</strong> — ${yaoNames[shakeCount-1]} Yao: <span style="color:${display.isChanging?'var(--red)':'var(--accent)'}">${display.desc}</span>`;

                if (shakeCount >= 6) {
                    document.getElementById('btnShake').textContent = '✅ View Result';
                    document.getElementById('btnShake').disabled = false;
                    document.getElementById('btnShake').onclick = function() {
                        buildGuaFromResults();
                    };
                    document.getElementById('shakeInfo').innerHTML =
                        '<strong style="color:var(--accent);">All six lines cast! Click "View Result" for interpretation.</strong>';
                    showToast('Casting complete. View your hexagram now.');
                } else {
                    document.getElementById('btnShake').disabled = false;
                    document.getElementById('btnShake').textContent = '🪙 Cast ' + (shakeCount+1) + ' of 6';
                }
            }, 500);
        }

        function updateYaoLinesDisplay(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const labels = ['Top','Fifth','Fourth','Third','Second','First'];
            let html = '';
            const displayOrder = [];
            for (let i = yaoResults.length - 1; i >= 0; i--) {
                displayOrder.push({ index: i, label: labels[i], result: yaoResults[i] });
            }
            displayOrder.forEach(item => {
                const d = yaoValueToDisplay(item.result.value);
                const dotClass = d.isChanging ? 'changing-dot' : 'stable-dot';
                html += `
                <div class="yao-row">
                    <span class="yao-label">${item.label}</span>
                    <span class="yao-symbol ${d.cls}">${d.symbol}</span>
                    <span class="yao-desc"><span class="yao-dot ${dotClass}"></span>${d.desc}</span>
                </div>`;
            });
            container.innerHTML = html;
        }

        function buildGuaFromResults() {
            if (yaoResults.length < 6) {
                showToast('Please complete all six casts first.');
                return;
            }
            const benYaoYang = yaoResults.map(r => r.isYang);
            const benShangKey = (benYaoYang[3]?'1':'0')+(benYaoYang[4]?'1':'0')+(benYaoYang[5]?'1':'0');
            const benXiaKey = (benYaoYang[0]?'1':'0')+(benYaoYang[1]?'1':'0')+(benYaoYang[2]?'1':'0');

            currentBenGua = getGuaByTrigrams(benShangKey, benXiaKey);
            changingYaoIndexes = [];
            yaoResults.forEach((r, i) => {
                if (r.isChanging) changingYaoIndexes.push(i);
            });

            renderResult();
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== Time-based Cast ====================
        function generateTimeGua() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hour = now.getHours();
            const minute = now.getMinutes();

            const sum1 = year + month + day;
            const sum2 = year + month + day + hour;
            const shangNum = ((sum1 - 1) % 8);
            const xiaNum = ((sum2 - 1) % 8);
            const dongYaoNum = ((minute - 1) % 6);

            const baguaKeys = ['111','110','101','100','011','010','001','000'];
            const shangKey = baguaKeys[shangNum];
            const xiaKey = baguaKeys[xiaNum];
            const shangBits = shangKey.split('').map(Number);
            const xiaBits = xiaKey.split('').map(Number);
            const allBits = [...xiaBits, ...shangBits];

            yaoResults = allBits.map((bit, i) => {
                const isYang = bit === 1;
                const isChanging = (i === dongYaoNum);
                let value;
                if (isYang && isChanging) value = 9;
                else if (isYang && !isChanging) value = 7;
                else if (!isYang && isChanging) value = 6;
                else value = 8;
                return { value, isYang, isChanging };
            });
            shakeCount = 6;

            document.getElementById('timeDisplay').textContent =
                `${year}-${month}-${day} ${hour}:${minute}`;
            updateYaoLinesDisplay('yaoLinesTime');
            buildGuaFromResults();
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== Quick Cast ====================
        function generateQuickGua() {
            yaoResults = [];
            for (let i = 0; i < 6; i++) {
                const result = tossThreeCoins();
                const display = yaoValueToDisplay(result.value);
                yaoResults.push({
                    value: result.value,
                    isYang: display.isYang,
                    isChanging: display.isChanging
                });
            }
            shakeCount = 6;
            updateYaoLinesDisplay('yaoLinesQuick');
            buildGuaFromResults();
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== Render Result (only Ben Gua + Gua Ci) ====================
        function renderResult() {
            const section = document.getElementById('resultSection');
            section.style.display = 'block';

            const benGua = currentBenGua;
            if (!benGua) {
                section.innerHTML = '<p style="text-align:center;color:var(--red);">Unable to determine hexagram. Please try again.</p>';
                return;
            }

            const benShang = getBaguaByKey(benGua[3]);
            const benXia = getBaguaByKey(benGua[4]);

            let html = '';
            // Hexagram card
            html += `
            <div class="gua-card">
                <div class="card-label">Primary Hexagram (Ben Gua)</div>
                <div class="gua-symbol">${(benShang?benShang.symbol:'')}${(benXia?benXia.symbol:'')}</div>
                <div class="gua-name">${benGua[1]}</div>
                <div class="gua-pinyin">${benGua[2]}</div>
                <div class="gua-trigrams">Upper: ${benShang?benShang.name+' ('+benShang.nature+')':''} · Lower: ${benXia?benXia.name+' ('+benXia.nature+')':''}</div>
                <div style="font-size:0.75rem;color:var(--text-light);margin-top:4px;">Hexagram #${benGua[0]}</div>
            </div>`;

            // Changing Yao info
            if (changingYaoIndexes.length > 0) {
                const yaoNames = ['First','Second','Third','Fourth','Fifth','Top'];
                const changingNames = changingYaoIndexes.map(i => yaoNames[i] + ' Yao').join(', ');
                html += `<div class="interpretation" style="margin-top:12px;">
                    <h3>⚡ Moving Lines (Changing Yao)</h3>
                    <p><strong>Changing:</strong> <span class="highlight">${changingNames}</span> (total ${changingYaoIndexes.length} moving line(s))</p>`;
                if (changingYaoIndexes.length === 1) {
                    const yiIdx = changingYaoIndexes[0];
                    const yaoCi = benGua[8] && benGua[8][yiIdx] ? benGua[8][yiIdx] : '(see hexagram text)';
                    html += `<p><strong>Key line text:</strong> 「${yaoCi}」</p>`;
                }
                html += `</div>`;
            } else {
                html += `<div class="interpretation" style="margin-top:12px;">
                    <h3>⚡ No Moving Lines</h3>
                    <p>All six lines are stable. Focus on the hexagram statement (Gua Ci) for interpretation.</p>
                </div>`;
            }

            // Gua Ci, Tuan Zhuan, Da Xiang
            html += `
            <div class="interpretation" style="margin-top:10px;">
                <h3>📖 Hexagram Statement (Gua Ci)</h3>
                <p style="font-size:1rem;letter-spacing:1px;">「${benGua[5]}」</p>
                <p style="font-size:0.82rem;color:var(--text-light);margin-top:4px;"><strong>Tuan Zhuan (Commentary):</strong> ${benGua[6]}</p>
                <p style="font-size:0.82rem;color:var(--text-light);"><strong>Da Xiang (Great Image):</strong> ${benGua[7]}</p>
            </div>`;

            // Yao Ci list
            if (benGua[8] && benGua[8].length === 6) {
                const yaoNames = ['First Yao','Second Yao','Third Yao','Fourth Yao','Fifth Yao','Top Yao'];
                html += '<div class="interpretation" style="margin-top:8px;"><h3>📝 Line Statements (Yao Ci)</h3>';
                benGua[8].forEach((ci, i) => {
                    const isChanging = changingYaoIndexes.includes(i);
                    html += `<p style="margin:2px 0;${isChanging?'color:var(--red);font-weight:600;':''}"><strong>${yaoNames[i]}:</strong> ${ci}${isChanging?' <span style="font-size:0.7rem;">← MOVING</span>':''}</p>`;
                });
                if (benGua[9]) {
                    html += `<p style="margin:2px 0;color:var(--gold);"><strong>Additional (Yong):</strong> ${benGua[9]}</p>`;
                }
                html += '</div>';
            }

            html += `
            <div style="text-align:center;margin-top:16px;font-size:0.75rem;color:var(--text-light);letter-spacing:1px;opacity:0.7;">
                ⚠ For reference only. The path of life is still walked by your own heart.
            </div>`;

            section.innerHTML = html;
        }

        // ==================== Reset ====================
        function resetAll() {
            shakeCount = 0;
            yaoResults = [];
            currentBenGua = null;
            changingYaoIndexes = [];
            document.getElementById('yaoLines').innerHTML = '';
            document.getElementById('yaoLinesTime').innerHTML = '';
            document.getElementById('yaoLinesQuick').innerHTML = '';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('resultSection').innerHTML = '';
            document.getElementById('shakeInfo').innerHTML = 'Click the button below to toss coins <strong>six times</strong> (from the first line to the top line)';
            document.getElementById('btnShake').textContent = '🪙 Shake';
            document.getElementById('btnShake').disabled = false;
            document.getElementById('btnShake').onclick = shakeCoins;
            document.getElementById('timeDisplay').textContent = '';
            const coins = document.querySelectorAll('#coinsDisplay .coin');
            coins.forEach(c => {
                c.className = 'coin heads';
                c.textContent = '☯';
            });
            document.getElementById('mainCard').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== Switch Method ====================
        function switchMethod(method) {
            currentMethod = method;
            resetAll();
            document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-method="${method}"]`).classList.add('active');
            document.getElementById('shakeArea').style.display = method === 'coin' ? 'block' : 'none';
            document.getElementById('timeGuaArea').style.display = method === 'time' ? 'block' : 'none';
            document.getElementById('quickGuaArea').style.display = method === 'quick' ? 'block' : 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('resultSection').innerHTML = '';
            if (method === 'time') {
                const now = new Date();
                document.getElementById('timeDisplay').textContent =
                    `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
            }
        }

        document.querySelectorAll('.method-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const method = this.getAttribute('data-method');
                switchMethod(method);
            });
        });

        document.getElementById('btnShake').onclick = shakeCoins;
        document.getElementById('btnReset').onclick = resetAll;

        function updateTimeDisplay() {
            const now = new Date();
            const el = document.getElementById('timeDisplay');
            if (el && currentMethod === 'time') {
                el.textContent = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
            }
        }
        setInterval(updateTimeDisplay, 30000);

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && currentMethod === 'coin' && shakeCount < 6 && document.activeElement === document.body) {
                e.preventDefault();
                shakeCoins();
            }
            if (e.key === 'r' && e.ctrlKey) {
                e.preventDefault();
                resetAll();
            }
        });

        console.log('I Ching Hexagram Tool ready (English UI, original Chinese texts).');
    </script>
</body>
</html>
